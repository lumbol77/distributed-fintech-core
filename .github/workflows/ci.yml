name: Sentinel CI Test Suite

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: wallet_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key-sentinel-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/wallet_db
      REDIS_URL: redis://localhost:6379/0
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      # Removed "Wait for PostgreSQL" and "Wait for Redis" blocks completely.
      # Service health options handle this blocks automatically before code runs.

      - name: Run test suite
        run: |
          python -m pytest app/tests/ -v --tb=short 2>&1 | tee test_results.txt
          # Using standard bash exit status retrieval for robustness
          exit_code=${PIPESTATUS[0]}
          echo "Exit code: $exit_code"
          exit $exit_code

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test_results.txt
          retention-days: 30

      - name: Print test summary
        if: always()
        run: |
          echo "================================"
          echo "       TEST SUITE SUMMARY"
          echo "================================"
          tail -5 test_results.txt