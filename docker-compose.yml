

services:
  wallet-service:
    build: . 
    container_name: wallet_api
    ports:
      - "8000:8000"
    restart: on-failure
    env_file:
      - .env
    # Live volume mount links your laptop folder directly to Docker
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - WATCHFILES_FORCE_POLLING=true  # Ensures instant file syncing on Windows/WSL
    # Added --reload flag so Uvicorn auto-reloads on file changes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis
      - fraud-api

  celery-worker:
    build: . 
    container_name: celery_worker
    # Reverted to standard celery command to bypass the missing watchfiles tool
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis
    restart: on-failure
    
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_monitoring
    volumes:
      - ./app/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - wallet-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  fraud-api:
    build: ./FRAUD_DETECTION_API
    container_name: fraud_detector
    ports:
      - "8001:8001"
    restart: on-failure
    environment:
      - PYTHONPATH=.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    depends_on:
      - redis

  db:
    image: postgres:15-alpine
    container_name: db-1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Zuzul2024@#
      - POSTGRES_DB=wallet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: